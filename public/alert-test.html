<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 Alert Test Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
      background: #0f0f19;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      background: rgba(20, 20, 35, 0.95);
      border-right: 1px solid rgba(102, 126, 234, 0.15);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #f093fb);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar p.subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(102, 126, 234, 0.1);
      color: rgba(102, 126, 234, 0.8);
      border: 1px solid rgba(102, 126, 234, 0.2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      animation: dotPulse 2s ease-in-out infinite;
    }

    .status-badge.connected .status-dot { background: #4ade80; }
    .status-badge.connected { color: rgba(74, 222, 128, 0.8); border-color: rgba(74, 222, 128, 0.2); background: rgba(74, 222, 128, 0.1); }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== Form ===== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input,
    .form-group textarea {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(102, 126, 234, 0.5);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    /* Quick amounts */
    .quick-amounts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .quick-btn {
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: rgba(102, 126, 234, 0.15);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .quick-btn.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
      border-color: rgba(102, 126, 234, 0.5);
      color: #fff;
    }

    /* Send button */
    .btn-send {
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .btn-send:active {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Response log */
    .log {
      margin-top: auto;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      max-height: 150px;
      overflow-y: auto;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .log-entry.success { color: #4ade80; }
    .log-entry.error { color: #f87171; }

    /* ===== Overlay URL Box ===== */
    .url-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .url-box code {
      flex: 1;
      font-size: 12px;
      color: rgba(102, 126, 234, 0.8);
      word-break: break-all;
    }

    .btn-copy {
      padding: 6px 12px;
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 6px;
      color: #667eea;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-copy:hover {
      background: rgba(102, 126, 234, 0.25);
    }

    /* ===== Preview ===== */
    .preview {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
    }

    .preview-header .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }

    .preview iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 400px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar: Controls -->
    <div class="sidebar">
      <div>
        <h1>🧪 Alert Test Dashboard</h1>
        <p class="subtitle">ส่ง test alert ไปยัง overlay</p>
      </div>

      <div class="status-badge" id="statusBadge">
        <div class="status-dot"></div>
        <span id="statusText">กำลังเชื่อมต่อ...</span>
      </div>

      <div class="form-group">
        <label>Overlay URL (สำหรับ OBS Browser Source)</label>
        <div class="url-box">
          <code id="overlayUrl">loading...</code>
          <button class="btn-copy" id="btnCopy" onclick="copyUrl()">Copy</button>
        </div>
      </div>

      <div class="form-group">
        <label>ชื่อผู้บริจาค</label>
        <input type="text" id="inputDonor" placeholder="Anonymous">
      </div>

      <div class="form-group">
        <label>จำนวนเงิน (บาท)</label>
        <div class="quick-amounts">
          <button class="quick-btn" onclick="setAmount(50)">฿50</button>
          <button class="quick-btn active" onclick="setAmount(100)">฿100</button>
          <button class="quick-btn" onclick="setAmount(500)">฿500</button>
          <button class="quick-btn" onclick="setAmount(1000)">฿1,000</button>
        </div>
        <input type="number" id="inputAmount" value="100" min="1" placeholder="100" style="margin-top: 8px;">
      </div>

      <div class="form-group">
        <label>ข้อความ</label>
        <textarea id="inputMessage" rows="2" placeholder="สู้ๆ นะครับ! 💪"></textarea>
      </div>

      <button class="btn-send" id="btnSend" onclick="sendTestAlert()">
        🚀 ส่ง Test Alert
      </button>

      <div class="log" id="logPanel">
        <div class="log-entry" style="color: rgba(255,255,255,0.2);">— ยังไม่มี log —</div>
      </div>
    </div>

    <!-- Preview: Overlay iframe -->
    <div class="preview">
      <div class="preview-header">
        <h2>📺 Overlay Preview</h2>
        <span class="hint">แสดง alert ที่ส่งแบบ real-time</span>
      </div>
      <iframe id="overlayFrame" src="/overlay"></iframe>
    </div>
  </div>

  <script>
    // Set overlay URL
    const overlayUrl = `${window.location.origin}/overlay`;
    document.getElementById('overlayUrl').textContent = overlayUrl;

    // Check connection status
    async function checkStatus() {
      try {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        // Simple check: if we can reach the overlay iframe
        badge.classList.add('connected');
        text.textContent = 'เชื่อมต่อแล้ว';
      } catch (e) {
        // ignore
      }
    }
    setTimeout(checkStatus, 1500);

    // Set amount
    function setAmount(val) {
      document.getElementById('inputAmount').value = val;
      document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    // Copy URL
    function copyUrl() {
      navigator.clipboard.writeText(overlayUrl).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    // Add log
    function addLog(message, type = '') {
      const panel = document.getElementById('logPanel');
      // Remove placeholder
      if (panel.children.length === 1 && panel.children[0].textContent.includes('ยังไม่มี')) {
        panel.innerHTML = '';
      }
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString('th-TH');
      entry.textContent = `[${time}] ${message}`;
      panel.prepend(entry);

      // Keep max 20 entries
      while (panel.children.length > 20) {
        panel.removeChild(panel.lastChild);
      }
    }

    // Send test alert
    async function sendTestAlert() {
      const btn = document.getElementById('btnSend');
      btn.disabled = true;
      btn.textContent = '⏳ กำลังส่ง...';

      try {
        const donor = document.getElementById('inputDonor').value || 'Anonymous';
        const amount = parseInt(document.getElementById('inputAmount').value) || 100;
        const message = document.getElementById('inputMessage').value || '';

        const res = await fetch('/api/alerts/test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ donor, amount, message })
        });

        const data = await res.json();

        if (data.success) {
          addLog(`✅ Alert sent: ${donor} ฿${amount.toLocaleString()} (${data.clients} overlay clients)`, 'success');
        } else {
          addLog(`❌ Failed: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (err) {
        addLog(`❌ Error: ${err.message}`, 'error');
      }

      btn.disabled = false;
      btn.textContent = '🚀 ส่ง Test Alert';
    }

    // Keyboard shortcut: Ctrl+Enter = send
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        sendTestAlert();
      }
    });
  </script>
</body>
</html>
